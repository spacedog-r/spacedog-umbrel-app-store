manifestVersion: 1
id: spacedog-dawarich
category: files
name: Dawarich
version: "1.10.0"
tagline: Your self-hosted location history tracker
icon: https://raw.githubusercontent.com/spacedog-r/spacedog-umbrel-app-store/master/spacedog-dawarich/assets/icon.png
description: >-
  This package currently targets amd64 systems because Dawarich 1.10.0 uses the official amd64-only PostGIS 17 image. It matches this store's intended amd64 homelab platform.


  Dawarich is a self-hosted alternative to Google Timeline for recording, importing, exploring, and sharing your location history.


  On first install, Umbrel replaces Dawarich's public upstream demo password with a unique local password. Use the username shown below and the password displayed by Umbrel. API routes remain reachable for mobile apps and trackers and are protected by Dawarich API keys.


  Features include interactive maps, trips, statistics, insights, family location sharing, imports from Google Maps Timeline, OwnTracks, GPX and GeoJSON, and photo integrations with Immich and PhotoPrism.


  Dawarich is under active development. Keep backups of your original location data and read upstream release notes before updating.
releaseNotes: ""

developer: Evgenii Frolov
